<!DOCTYPE html>
<html>
<head>
    <title>Live GPS Tracker</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var channelID = "3272807";
var readAPI = "SAVKWFOOGHDSZ4CG";

var map = L.map('map').setView([20, 78], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);

var marker;

function updateLocation() {

    fetch("https://api.thingspeak.com/channels/" + channelID +
          "/feeds/last.json?api_key=" + readAPI)

    .then(response => response.json())
    .then(data => {

        var lat = parseFloat(data.field1);
        var lon = parseFloat(data.field2);

        if (!isNaN(lat) && !isNaN(lon)) {

            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lon]).addTo(map)
                     .bindPopup("Live Location")
                     .openPopup();

            map.setView([lat, lon], 18);
        }
    });
}

updateLocation();
setInterval(updateLocation, 15000);

</script>

</body>
</html>
