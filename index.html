<!DOCTYPE html>
<html>
<head>
<title>Ridham Professional GPS Tracker</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0f172a;
    color:white;
}

#map{
    height:100vh;
    width:100%;
}

/* Move zoom buttons down */
.leaflet-top.leaflet-left{
    top:100px;
}

/* Remove leaflet attribution */
.leaflet-control-attribution{
    display:none;
}

.dashboard{
    position:absolute;
    top:20px;
    right:20px;
    width:300px;
    background:rgba(15,23,42,0.95);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    z-index:1000;
}

.title{
    font-size:18px;
    font-weight:600;
    margin-bottom:15px;
}

.stat{
    margin-bottom:12px;
}

.label{
    font-size:12px;
    opacity:0.6;
}

.value{
    font-size:20px;
    font-weight:bold;
}

.green{ color:#22c55e; }
.blue{ color:#38bdf8; }
.orange{ color:#f59e0b; }

.status{
    display:flex;
    align-items:center;
    margin-top:10px;
}

.dot{
    height:10px;
    width:10px;
    background:#22c55e;
    border-radius:50%;
    margin-right:8px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(34,197,94,0.7);}
    70%{box-shadow:0 0 0 10px rgba(34,197,94,0);}
    100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="dashboard">
    <div class="title">Live GPS Dashboard</div>

    <div class="stat">
        <div class="label">Speed</div>
        <div class="value green" id="speed">0 km/h</div>
    </div>

    <div class="stat">
        <div class="label">Total Distance</div>
        <div class="value blue" id="distance">0 m</div>
    </div>

    <div class="stat">
        <div class="label">Latitude</div>
        <div class="value orange" id="lat">--</div>
    </div>

    <div class="stat">
        <div class="label">Longitude</div>
        <div class="value orange" id="lon">--</div>
    </div>

    <div class="stat">
        <div class="label">Last Update</div>
        <div class="value" id="time">--</div>
    </div>

    <div class="status">
        <div class="dot"></div>
        <div>Device Online</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var channelID="3272807";
var readAPI="SAVKWFOOGHDSZ4CG";

var map=L.map('map').setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

var marker;
var polyline=L.polyline([],{color:'#22c55e',weight:4}).addTo(map);

var totalDistance=0;

function updateLocation(){

fetch("https://api.thingspeak.com/channels/"+channelID+
"/feeds/last.json?api_key="+readAPI)

.then(response=>response.json())
.then(data=>{

var lat=parseFloat(data.field1);
var lon=parseFloat(data.field2);

if(!isNaN(lat)&&!isNaN(lon)){

if(marker){
var prev=marker.getLatLng();
var newLatLng=L.latLng(lat,lon);
var dist=map.distance(prev,newLatLng);
totalDistance+=dist;
document.getElementById("distance").innerHTML=
totalDistance.toFixed(2)+" m";
}

if(marker){
map.removeLayer(marker);
}

marker=L.circleMarker([lat,lon],{
radius:10,
fillColor:"#22c55e",
color:"#ffffff",
weight:3,
fillOpacity:0.9
}).addTo(map);

polyline.addLatLng([lat,lon]);

map.setView([lat,lon],18);

document.getElementById("lat").innerHTML=lat.toFixed(6);
document.getElementById("lon").innerHTML=lon.toFixed(6);

document.getElementById("time").innerHTML=
new Date(data.created_at).toLocaleString();

if(polyline.getLatLngs().length>1){
var pts=polyline.getLatLngs();
var last=pts[pts.length-1];
var prev=pts[pts.length-2];
var d=map.distance(prev,last);
var speed=(d/15)*3.6;
document.getElementById("speed").innerHTML=
speed.toFixed(2)+" km/h";
}
}
});
}

updateLocation();
setInterval(updateLocation,15000);

</script>

</body>
</html>
