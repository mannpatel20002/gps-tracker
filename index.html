
<!DOCTYPE html>
<html>
<head>

<title>Smart Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;}
#map{height:100vh;}

.panel{
position:absolute;right:20px;top:20px;width:300px;
background:#111827;padding:15px;border-radius:12px;
}

.toggle{display:flex;justify-content:space-between;margin-top:10px;}

.switch{
width:50px;height:25px;background:#374151;border-radius:20px;
cursor:pointer;position:relative;
}

.switch::after{
content:'';width:20px;height:20px;background:white;
position:absolute;top:2.5px;left:3px;border-radius:50%;
transition:0.3s;
}

.switch.active{background:#22c55e;}
.switch.active::after{left:26px;}

button{
width:100%;margin-top:10px;padding:10px;border:none;
background:#ef4444;color:white;border-radius:8px;
}
</style>

</head>

<body>

<div id="map"></div>

<div class="panel">

<h3>Tracker</h3>

<p>Lat: <span id="lat"></span></p>
<p>Lon: <span id="lon"></span></p>
<p>Speed: <span id="speed"></span> km/h</p>

<div class="toggle">
<span>Safety</span>
<div class="switch" onclick="toggle(this,5)"></div>
</div>

<div class="toggle">
<span>SMS</span>
<div class="switch" onclick="toggle(this,6)"></div>
</div>

<div class="toggle">
<span>Call</span>
<div class="switch" onclick="toggle(this,7)"></div>
</div>

<button onclick="buzz()">🔔 Find Device</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var ch=":3272807";
var read="SAVKWFOOGHDSZ4CG";
var write="C6NTK8JIB7MD43EC";

var map=L.map('map').setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;

function update(){

fetch(`https://api.thingspeak.com/channels/${ch}/feeds/last.json?api_key=${read}`)
.then(r=>r.json())
.then(d=>{

let lat=parseFloat(d.field1);
let lon=parseFloat(d.field2);

document.getElementById("lat").innerHTML=lat;
document.getElementById("lon").innerHTML=lon;
document.getElementById("speed").innerHTML=d.field4||0;

if(marker) map.removeLayer(marker);

marker=L.marker([lat,lon]).addTo(map);

map.setView([lat,lon],17);

});

}

function toggle(el,f){

el.classList.toggle("active");

let val=el.classList.contains("active")?1:0;

fetch(`https://api.thingspeak.com/update?api_key=${write}&field${f}=${val}`);

}

function buzz(){

fetch(`https://api.thingspeak.com/update?api_key=${write}&field8=1`);

}

setInterval(update,15000);
update();

</script>

</body>
</html>
