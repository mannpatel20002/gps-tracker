<!DOCTYPE html>
<html>
<head>
<title>Live Tracker</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🚗 Live Tracker</h1>

<div class="card">
  <p>Latitude: <span id="lat"></span></p>
  <p>Longitude: <span id="lng"></span></p>
  <p>Speed: <span id="speed"></span></p>
</div>

<iframe id="map" width="90%" height="300"></iframe>

<div class="card">
  <button onclick="alert('Call from SIM')">Call</button>
  <button onclick="alert('SMS Alert')">SMS</button>
  <button onclick="alert('Buzzer Activated')">Find Device</button>
</div>

<script>
async function fetchData() {
  let res = await fetch("https://api.thingspeak.com/channels/3272807/feeds/last.json");
  let data = await res.json();

  document.getElementById("lat").innerText = data.field1;
  document.getElementById("lng").innerText = data.field2;
  document.getElementById("speed").innerText = data.field3 + " km/h";

  document.getElementById("map").src =
    `https://maps.google.com/maps?q=${data.field1},${data.field2}&z=15&output=embed`;
}

setInterval(fetchData, 5000);
</script>

</body>
</html>
