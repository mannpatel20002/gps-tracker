<!DOCTYPE html>
<html>
<head>
<title>Live Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#map { height: 300px; margin: 20px; }

.card {
  background: #1e293b;
  padding: 15px;
  margin: 15px;
  border-radius: 12px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>📍 Live Tracker</h2>

<div id="map"></div>

<div class="card">
  <p>Latitude: <span id="lat"></span></p>
  <p>Longitude: <span id="lng"></span></p>
  <p>Speed: <span id="speed"></span></p>
  <p>Last Update: <span id="time"></span></p>
</div>

<div class="card">
  <button onclick="sendCommand('CALL')">Call</button>
  <button onclick="sendCommand('SMS')">SMS</button>
  <button onclick="sendCommand('BUZZ')">Find Device</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([0,0], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker = L.marker([0,0]).addTo(map);

async function fetchData() {
  let res = await fetch("https://api.thingspeak.com/channels/3272807/feeds/last.json");
  let data = await res.json();

  let lat = parseFloat(data.field1);
  let lng = parseFloat(data.field2);

  document.getElementById("lat").innerText = lat;
  document.getElementById("lng").innerText = lng;
  document.getElementById("speed").innerText = data.field3 + " km/h";
  document.getElementById("time").innerText = data.created_at;

  map.setView([lat, lng], 15);
  marker.setLatLng([lat, lng]);
}

async function sendCommand(cmd) {
  await fetch(`https://api.thingspeak.com/update?api_key=C6NTK8JIB7MD43EC&field4=${cmd}`);
}

setInterval(fetchData, 5000);
</script>

</body>
</html>
