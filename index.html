
<!DOCTYPE html>
<html>
<head>
<title>Smart Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;}
#map{height:100vh;}
.panel{
position:fixed;top:20px;right:20px;width:300px;
background:#111827;padding:15px;border-radius:12px;z-index:9999;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<h3>Tracker</h3>
<p>Lat: <span id="lat"></span></p>
<p>Lon: <span id="lon"></span></p>
<p>Speed: <span id="speed"></span></p>
<p>Last: <span id="time"></span></p>
<p>Addr: <span id="addr">--</span></p>

<button onclick="buzz()">Find Device</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var ch="3272807";
var read="SAVKWFOOGHDSZ4CG";
var write="C6NTK8JIB7MD43EC";

var map=L.map('map').setView([20,78],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;
var lastLat=0,lastLon=0;

function update(){

fetch(`https://api.thingspeak.com/channels/${ch}/feeds/last.json?api_key=${read}`)
.then(r=>r.json())
.then(d=>{

let lat=parseFloat(d.field1);
let lon=parseFloat(d.field2);

document.getElementById("lat").innerHTML=lat;
document.getElementById("lon").innerHTML=lon;
document.getElementById("speed").innerHTML=d.field4||0;
document.getElementById("time").innerHTML=new Date(d.created_at).toLocaleString();

if(marker) map.removeLayer(marker);
marker=L.marker([lat,lon]).addTo(map);
map.setView([lat,lon],17);

// address only if changed
if(lat!=lastLat || lon!=lastLon){
getAddr(lat,lon);
lastLat=lat;
lastLon=lon;
}

});

}

function getAddr(lat,lon){
fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(r=>r.json())
.then(d=>{
document.getElementById("addr").innerHTML=d.display_name;
});
}

function buzz(){
fetch(`https://api.thingspeak.com/update?api_key=${write}&field8=1`);
}

setInterval(update,10000);
update();

</script>

</body>
</html>
