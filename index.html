<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPS Live Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --bg:#eef3f9;
  --card:#ffffff;
  --border:#d6e0ef;
  --accent:#0066ff;
  --green:#00c853;
  --red:#ff3b3b;
  --text:#1c2b3a;
  --muted:#6c7a92;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--text);}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px;background:#fff;border-bottom:1px solid var(--border);
}
.logo{display:flex;gap:10px;align-items:center;}
.logo-icon{background:var(--accent);color:#fff;padding:6px 10px;border-radius:6px;}
.logo h1{font-family:'Orbitron';font-size:1rem;color:var(--accent);}
.status{
  font-size:.8rem;font-weight:600;
  padding:4px 10px;border-radius:20px;
}
.online{background:#e6fff0;color:var(--green);}
.offline{background:#ffe5e5;color:var(--red);}

/* LAYOUT */
.wrap{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
}
.title{font-size:.75rem;color:var(--muted);margin-bottom:8px;}

.value{font-size:1rem;font-weight:600;color:var(--accent);}

/* SPEED */
.speed{
  font-size:2.3rem;
  color:#ff9800;
}

/* MAP */
.map-wrap{
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
}
#map{height:520px;}

/* FOOT INFO */
.footer{
  margin-top:8px;
  font-size:.7rem;
  color:var(--muted);
}

/* MOBILE */
@media(max-width:860px){
  .wrap{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <div class="logo-icon">📍</div>
    <h1>GEOTRACK</h1>
  </div>
  <div id="statusEl" class="status offline">OFFLINE</div>
</header>

<div class="wrap">

<!-- LEFT PANEL -->
<div>

<div class="card">
<div class="title">Coordinates</div>
<div>Lat: <span id="latEl" class="value">--</span></div>
<div>Lng: <span id="lngEl" class="value">--</span></div>
</div>

<div class="card">
<div class="title">Speed</div>
<div id="speedEl" class="speed">0</div>
</div>

<div class="card">
<div class="title">Address</div>
<div id="addrEl">Waiting...</div>
</div>

<div class="card">
<div class="title">GPS Info</div>
<div>Sats: <span id="satEl">--</span></div>
<div>Status: <span id="fixEl">NO FIX</span></div>
<div class="footer">Last Updated: <span id="timeEl">--</span></div>
</div>

</div>

<!-- MAP -->
<div class="map-wrap">
<div id="map"></div>
</div>

</div>

<script>
// CONFIG
var CH='3272807';
var RK='SAVKWFOOGHDSZ4CG';
var REF=15000;

var map,marker;

// INIT MAP
function initMap(){
  map=L.map('map',{zoomControl:true, attributionControl:false})
  .setView([20.59,78.96],5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  var icon=L.icon({
    iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize:[28,28]
  });

  marker=L.marker([20.59,78.96],{icon}).addTo(map);
}

// FETCH DATA
function fetch_data(){
fetch(`https://api.thingspeak.com/channels/${CH}/feeds/last.json?api_key=${RK}`)
.then(r=>r.json())
.then(d=>process(d))
.catch(()=>setOffline());
}

// PROCESS
function process(d){
var lat=parseFloat(d.field1);
var lng=parseFloat(d.field2);
var spd=parseFloat(d.field3)||0;
var sats=parseInt(d.field5)||0;

var ok=!isNaN(lat)&&!isNaN(lng)&&lat!==0&&lng!==0;

// STATUS
if(ok){
  setOnline();
}else{
  setOffline();
}

// DATA UI
document.getElementById('latEl').textContent=ok?lat.toFixed(5):'--';
document.getElementById('lngEl').textContent=ok?lng.toFixed(5):'--';
document.getElementById('speedEl').textContent=spd.toFixed(1);
document.getElementById('satEl').textContent=sats;
document.getElementById('fixEl').textContent=ok?'FIX OK':'NO FIX';

// TIME
if(d.created_at){
  var t=new Date(d.created_at).toLocaleTimeString();
  document.getElementById('timeEl').textContent=t;
}

// MAP
if(ok){
marker.setLatLng([lat,lng]);
map.setView([lat,lng],15);
geocode(lat,lng);
}
}

// STATUS FUNCTIONS
function setOnline(){
let el=document.getElementById('statusEl');
el.textContent='ONLINE';
el.className='status online';
}
function setOffline(){
let el=document.getElementById('statusEl');
el.textContent='OFFLINE';
el.className='status offline';
}

// GEOCODE
function geocode(lat,lng){
fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
.then(r=>r.json())
.then(j=>{
document.getElementById('addrEl').textContent=j.display_name||'Not found';
});
}

// START
initMap();
fetch_data();
setInterval(fetch_data,REF);
</script>

</body>
</html>
