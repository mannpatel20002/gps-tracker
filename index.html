<!DOCTYPE html>
<html>
<head>
  <title>Buzzer Control</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 80px;
    }
    button {
      padding: 20px 40px;
      font-size: 20px;
      margin: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .on { background: green; }
    .off { background: red; }
  </style>
</head>
<body>

<h2>🔔 BUZZER CONTROL</h2>

<button class="on" onclick="setBuzzer(1)">TURN ON</button>
<button class="off" onclick="setBuzzer(0)">TURN OFF</button>

<script>
const API_KEY = "C6NTK8JIB7MD43EC";

function setBuzzer(val) {
  const url = "https://api.thingspeak.com/update?api_key=" + API_KEY + "&field1=" + val;

  fetch(url)
    .then(res => res.text())
    .then(data => {
      alert("Sent: " + val + " | Entry ID: " + data);
      console.log("Response:", data);
    })
    .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
