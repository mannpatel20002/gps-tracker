
<!DOCTYPE html>
<html>
<head>

<title>Smart Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{margin:0;background:#0f172a;color:white;font-family:sans-serif;}

#map{height:100vh;}

.panel{
position:absolute;
right:20px;
top:20px;
width:320px;
background:#111827;
padding:15px;
border-radius:12px;
z-index:999;
}

button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="panel">

<h3>Smart Tracker</h3>

<p>Lat: <span id="lat"></span></p>
<p>Lon: <span id="lon"></span></p>
<p>Speed: <span id="speed"></span> km/h</p>
<p>Last: <span id="time"></span></p>

<button onclick="toggle(5)">Safety Alert</button>
<button onclick="toggle(6)">SMS Alert</button>
<button onclick="toggle(7)">Call Alert</button>
<button onclick="findDevice()">Find Device 🔔</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var ch="3272807";
var key="SAVKWFOOGHDSZ4CG";
var write="C6NTK8JIB7MD43EC";

var map=L.map('map').setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;

function update(){

fetch(`https://api.thingspeak.com/channels/${ch}/feeds/last.json?api_key=${key}`)
.then(r=>r.json())
.then(d=>{

let lat=parseFloat(d.field1);
let lon=parseFloat(d.field2);

document.getElementById("lat").innerHTML=lat;
document.getElementById("lon").innerHTML=lon;
document.getElementById("speed").innerHTML=d.field4;
document.getElementById("time").innerHTML=new Date(d.created_at).toLocaleString();

if(marker) map.removeLayer(marker);

marker=L.marker([lat,lon]).addTo(map);

map.setView([lat,lon],17);

});

}

function toggle(field){

fetch(`https://api.thingspeak.com/update?api_key=${write}&field${field}=1`);

}

function findDevice(){

fetch(`https://api.thingspeak.com/update?api_key=${write}&field8=1`);

}

setInterval(update,15000);
update();

</script>

</body>
</html>
