<!DOCTYPE html>
<html>
<head>
  <title>Buzzer Control</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #111;
      color: white;
    }
    button {
      padding: 20px 40px;
      font-size: 20px;
      margin: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .on { background: #00c853; color: white; }
    .off { background: #d50000; color: white; }
  </style>
</head>
<body>

<h2>🔔 ESP32 BUZZER CONTROL</h2>

<button class="on" onclick="setBuzzer(1)">TURN ON</button>
<button class="off" onclick="setBuzzer(0)">TURN OFF</button>

<script>
const API_KEY = "C6NTK8JIB7MD43EC";

function setBuzzer(val) {
  fetch(`https://api.thingspeak.com/update?api_key=${API_KEY}&field1=${val}`)
    .then(() => alert("Command Sent: " + val))
    .catch(() => alert("Error sending command"));
}
</script>

</body>
</html>
