<!DOCTYPE html>
<html>
<head>
    <title>Advanced GPS Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #map { height: 350px; border-radius: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 10px; text-align: center; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-find { background: #ff9800; color: white; }
        .toggle-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        h2 { color: #2c3e50; margin-top: 0; }
        #address { color: #7f8c8d; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Live Tracker Dashboard</h2>
        <div id="map"></div>
        
        <div class="grid">
            <div class="card">
                <h3>Speed</h3>
                <h1 id="speed">0.0</h1> km/h
            </div>
            <div class="card">
                <h3>Current Address</h3>
                <p id="address">Fetching address...</p>
            </div>
        </div>

        <div class="card" style="margin-top:20px;">
            <h3>Alert & Control Settings</h3>
            <div class="toggle-container">
                <span>SMS Alerts (MPU)</span>
                <input type="checkbox" id="smsToggle" onclick="toggleFeature('5', this)">
            </div>
            <div class="toggle-container">
                <span>Call Alerts (MPU)</span>
                <input type="checkbox" id="callToggle" onclick="toggleFeature('6', this)">
            </div>
            <button class="btn btn-find" onclick="triggerBuzzer()">FIND DEVICE (5s Buzzer)</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([0, 0]).addTo(map);

        async function updateDashboard() {
            const res = await fetch('https://api.thingspeak.com/channels/3272807/feeds.json?api_key=SAVKWFOOGHDSZ4CG&results=1');
            const data = await res.json();
            const last = data.feeds[0];
            
            const lat = parseFloat(last.field1);
            const lng = parseFloat(last.field2);
            document.getElementById('speed').innerText = last.field3;
            
            marker.setLatLng([lat, lng]);
            map.setView([lat, lng], 16);

            // Get Full Address
            const addrRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const addrData = await addrRes.json();
            document.getElementById('address').innerText = addrData.display_name || "Address not found";
        }

        function toggleFeature(field, element) {
            const val = element.checked ? "1" : "0";
            fetch(`https://api.thingspeak.com/update?api_key=C6NTK8JIB7MD43EC&field${field}=${val}`);
        }

        function triggerBuzzer() {
            fetch(`https://api.thingspeak.com/update?api_key=C6NTK8JIB7MD43EC&field7=1`)
            .then(() => {
                alert("Find Command Sent!");
                setTimeout(() => fetch(`https://api.thingspeak.com/update?api_key=C6NTK8JIB7MD43EC&field7=0`), 6000);
            });
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
