<style>
:root {
  --bg:     #f4f7fb;
  --panel:  #ffffff;
  --border: #d6e0ef;
  --accent: #007bff;
  --a2:     #ff3b3b;
  --a3:     #ff9800;
  --a4:     #17a2b8;
  --text:   #1c2b3a;
  --muted:  #6c7a92;
  --card:   #ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#fff;
  border-bottom:1px solid var(--border);
}
.logo h1{color:var(--accent);font-size:1rem;}
.logo p{color:var(--muted);font-size:.6rem;}
.logo-icon{
  background:var(--accent);
  color:#fff;
  border-radius:6px;
}

/* LAYOUT */
.wrap{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
}
.card-title{
  font-size:.7rem;
  color:var(--muted);
  margin-bottom:10px;
}

/* COORDS */
.coord-box{
  background:#f9fbff;
  border:1px solid var(--border);
}
.coord-val{
  color:var(--accent);
  font-size:.95rem;
}

/* SPEED */
.speed-big{
  color:var(--a3);
  font-size:2.5rem;
}
.bar-bg{
  background:#e0e6f1;
}
.bar-fill{
  background:var(--a3);
}

/* SIGNAL */
.sig-row{
  border-bottom:1px solid #eef2f8;
}

/* MAP */
.map-wrap{
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
}
#map{
  min-height:520px;
}
.map-pill{
  background:#fff;
  border:1px solid var(--border);
  color:var(--text);
}

/* ALERT */
.alert-banner{
  background:#ffe5e5;
  color:#d60000;
  border:1px solid #ffb3b3;
}

/* LOG */
.log-inner{
  background:#fff;
}
.le.ok{color:green;}
.le.warn{color:orange;}
.le.err{color:red;}
.le.info{color:#007bff;}

/* RESPONSIVE */
@media(max-width:860px){
  .wrap{grid-template-columns:1fr;}
}
</style>
